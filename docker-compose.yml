services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
      - ALLOWED_HOSTS=localhost,127.0.0.1,server,testserver
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
